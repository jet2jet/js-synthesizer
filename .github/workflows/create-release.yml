name: Create GitHub Release

on:
  push:
    tags:
      - '*'
permissions: {}
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # for gh release create

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          BODY=$(awk -v tag="## ${TAG_NAME}" '
            $0 ~ tag {found=1; next}
            found && /^## / {exit}
            found {print}
          ' CHANGELOG.md 2>/dev/null || true)
          echo "TAG_NAME=${TAG_NAME}" >> "$GITHUB_ENV"
          if [ -n "$BODY" ]; then
            echo "RELEASE_BODY<<EOF" >> "$GITHUB_ENV"
            echo "$BODY" >> "$GITHUB_ENV"
            echo "EOF" >> "$GITHUB_ENV"
          fi

      - name: Create Release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ env.TAG_NAME }}
          RELEASE_BODY: ${{ env.RELEASE_BODY }}
        run: |
          if [ -n "$RELEASE_BODY" ]; then
            printf '%s\n' "$RELEASE_BODY" > release-notes.md
            gh release create "$TAG_NAME" --title "$TAG_NAME" --notes-file release-notes.md
          else
            gh release create "$TAG_NAME" --title "$TAG_NAME"
          fi
